<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="750" fill="#f1f3f4"/>

<!-- Chrome window -->
<rect x="0" y="0" width="1200" height="68" fill="#dee1e6"/>
<!-- Traffic light -->
<circle cx="20" cy="22" r="6" fill="#ff5f56"/>
<circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
<circle cx="60" cy="22" r="6" fill="#27c93f"/>
<!-- Tab -->
<path d="M 90 44 Q 90 12 110 12 L 320 12 Q 340 12 340 44 Z" fill="#fff"/>
<circle cx="115" cy="28" r="7" fill="#1a73e8"/>
<text x="130" y="32" font-size="12" fill="#202124">拡張機能</text>
<!-- Nav buttons -->
<circle cx="22" cy="56" r="10" fill="none" stroke="#5f6368" stroke-width="1.5"/>
<text x="18" y="60" font-size="13" fill="#5f6368">←</text>
<circle cx="52" cy="56" r="10" fill="none" stroke="#5f6368" stroke-width="1.5"/>
<text x="48" y="60" font-size="13" fill="#5f6368">→</text>
<circle cx="82" cy="56" r="10" fill="none" stroke="#5f6368" stroke-width="1.5"/>
<text x="78" y="60" font-size="11" fill="#5f6368">⟳</text>
<!-- Address bar -->
<rect x="110" y="46" width="980" height="22" rx="11" fill="#fff" stroke="#dadce0"/>
<text x="124" y="61" font-size="11" fill="#5f6368">🔒 chrome://extensions</text>

<!-- Sidebar -->
<rect x="0" y="68" width="256" height="682" fill="#fff" stroke="#e8eaed"/>
<text x="24" y="110" font-size="20" font-weight="700" fill="#202124">≡ 拡張機能</text>
<text x="24" y="160" font-size="13" fill="#1a73e8" font-weight="500">▸ 拡張機能</text>
<text x="24" y="195" font-size="13" fill="#5f6368">  ショートカット</text>
<text x="24" y="230" font-size="13" fill="#5f6368">  Chrome ウェブストアを開く</text>
<!-- Top bar with dev mode toggle highlighted -->
<rect x="280" y="90" width="900" height="60" fill="#fff" rx="8" stroke="#e8eaed"/>
<text x="304" y="128" font-size="18" font-weight="700" fill="#202124">拡張機能</text>
<!-- Search -->
<rect x="500" y="106" width="280" height="32" fill="#f1f3f4" rx="16"/>
<text x="516" y="126" font-size="12" fill="#5f6368">🔍 拡張機能を検索</text>
<!-- Dev mode toggle ON — highlighted -->
<g>
  <rect x="950" y="100" width="210" height="40" fill="#e8f0fe" rx="8" stroke="#fa006d" stroke-width="3"/>
  <text x="968" y="124" font-size="13" fill="#202124">デベロッパーモード</text>
  <rect x="1108" y="110" width="36" height="20" fill="#1a73e8" rx="10"/>
  <circle cx="1134" cy="120" r="8" fill="#fff"/>
</g>
<!-- Arrow callout -->
<path d="M 970 78 L 1055 95" stroke="#fa006d" stroke-width="2.5" fill="none" marker-end="url(#arrow1)"/>
<defs><marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fa006d"/></marker></defs>
<rect x="780" y="50" width="200" height="32" fill="#fa006d" rx="6"/>
<text x="800" y="71" font-size="13" fill="#fff" font-weight="700">① ここを ON にする</text>
<!-- Dev mode action buttons (appears after toggle) -->
<rect x="280" y="170" width="900" height="56" fill="#fff" rx="8" stroke="#e8eaed"/>
<rect x="304" y="183" width="270" height="30" fill="#1a73e8" rx="4"/>
<text x="312" y="203" font-size="12" fill="#fff" font-weight="700">📦 パッケージ化されていない拡張機能を読み込む</text>
<rect x="586" y="183" width="170" height="30" fill="#fff" rx="4" stroke="#dadce0"/>
<text x="604" y="203" font-size="12" fill="#1a73e8">拡張機能をパッケージ化</text>
<rect x="768" y="183" width="90" height="30" fill="#fff" rx="4" stroke="#dadce0"/>
<text x="788" y="203" font-size="12" fill="#1a73e8">更新</text>
<!-- Sample extension cards -->
<rect x="280" y="244" width="442" height="180" fill="#fff" rx="8" stroke="#e8eaed"/>
<rect x="304" y="268" width="48" height="48" rx="8" fill="#1a1a2e"/>
<text x="328" y="298" font-size="22" fill="#fa006d" text-anchor="middle" font-weight="700">L</text>
<text x="368" y="284" font-size="14" font-weight="700" fill="#202124">Livestream コメント抽出 v4</text>
<text x="368" y="302" font-size="11" fill="#5f6368">4.3.1</text>
<text x="368" y="324" font-size="11" fill="#5f6368">FW Assistant + YouTube ライブチャットのコメント抽出</text>
<rect x="304" y="340" width="60" height="22" fill="#fff" rx="4" stroke="#dadce0"/><text x="318" y="356" font-size="10" fill="#1a73e8">詳細</text>
<rect x="372" y="340" width="60" height="22" fill="#fff" rx="4" stroke="#dadce0"/><text x="380" y="356" font-size="10" fill="#1a73e8">削除</text>
<rect x="660" y="396" width="40" height="20" fill="#1a73e8" rx="10"/><circle cx="690" cy="406" r="8" fill="#fff"/>
<rect x="738" y="244" width="442" height="180" fill="#fff" rx="8" stroke="#e8eaed" opacity="0.7"/>
<rect x="762" y="268" width="48" height="48" rx="8" fill="#999"/>
<text x="826" y="284" font-size="14" font-weight="700" fill="#202124">(他の拡張)</text>
<text x="826" y="302" font-size="11" fill="#5f6368">3.1.0</text>

</svg>
