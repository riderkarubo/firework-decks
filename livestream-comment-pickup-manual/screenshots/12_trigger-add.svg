<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="750" fill="#f5f5f5"/>

<rect x="0" y="0" width="1200" height="68" fill="#dee1e6"/>
<circle cx="20" cy="22" r="6" fill="#ff5f56"/>
<circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
<circle cx="60" cy="22" r="6" fill="#27c93f"/>
<path d="M 90 44 Q 90 12 110 12 L 320 12 Q 340 12 340 44 Z" fill="#fff"/>
<circle cx="115" cy="28" r="7" fill="#1a73e8"/>
<text x="130" y="32" font-size="12" fill="#202124">Apps Script</text>
<rect x="110" y="46" width="980" height="22" rx="11" fill="#fff" stroke="#dadce0"/>
<text x="124" y="61" font-size="11" fill="#5f6368">🔒 script.google.com/.../triggers</text>

<!-- GAS sidebar -->
<rect x="0" y="68" width="56" height="682" fill="#202124"/>
<g font-size="14" fill="#9aa0a6" text-anchor="middle">
<text x="28" y="118">≡</text>
<text x="28" y="158">📄</text>
<text x="28" y="198">&lt;/&gt;</text>
<rect x="10" y="218" width="36" height="36" rx="6" fill="#3c4043"/>
<text x="28" y="244" fill="#fff">⏰</text>
<text x="28" y="288">▤</text>
</g>
<!-- Triggers list panel -->
<rect x="56" y="68" width="1144" height="682" fill="#f1f3f4"/>
<text x="92" y="108" font-size="22" font-weight="700" fill="#202124">トリガー</text>
<text x="92" y="134" font-size="12" fill="#5f6368">「コード.gs」プロジェクトのトリガー</text>
<!-- Dimmed bg -->
<rect x="56" y="68" width="1144" height="682" fill="rgba(0,0,0,0.4)"/>
<!-- Dialog -->
<rect x="280" y="80" width="640" height="600" fill="#fff" rx="12"/>
<text x="312" y="122" font-size="20" font-weight="700" fill="#202124">「2026-06-28 スタバ配信」のトリガーを追加</text>
<line x1="312" y1="142" x2="888" y2="142" stroke="#e8eaed"/>
<!-- Form -->
<text x="312" y="178" font-size="12" font-weight="700" fill="#202124">実行する関数を選択</text>
<rect x="312" y="188" width="576" height="40" rx="4" fill="#e8f0fe" stroke="#fa006d" stroke-width="2"/>
<text x="328" y="213" font-size="13" font-weight="700" font-family="'SF Mono','Consolas',monospace" fill="#202124">syncAll</text>
<text x="864" y="213" font-size="14" fill="#5f6368">▾</text>
<text x="312" y="262" font-size="12" font-weight="700" fill="#202124">実行するデプロイを選択</text>
<rect x="312" y="272" width="576" height="40" rx="4" fill="#fff" stroke="#dadce0"/>
<text x="328" y="297" font-size="13" fill="#202124">Head</text>
<text x="864" y="297" font-size="14" fill="#5f6368">▾</text>
<text x="312" y="346" font-size="12" font-weight="700" fill="#202124">イベントのソースを選択</text>
<rect x="312" y="356" width="576" height="40" rx="4" fill="#e8f0fe" stroke="#fa006d" stroke-width="2"/>
<text x="328" y="381" font-size="13" font-weight="700" fill="#202124">時間主導型</text>
<text x="864" y="381" font-size="14" fill="#5f6368">▾</text>
<text x="312" y="430" font-size="12" font-weight="700" fill="#202124">時間ベースのトリガーのタイプを選択</text>
<rect x="312" y="440" width="576" height="40" rx="4" fill="#e8f0fe" stroke="#fa006d" stroke-width="2"/>
<text x="328" y="465" font-size="13" font-weight="700" fill="#202124">分タイマー</text>
<text x="864" y="465" font-size="14" fill="#5f6368">▾</text>
<text x="312" y="514" font-size="12" font-weight="700" fill="#202124">分の間隔を選択</text>
<rect x="312" y="524" width="576" height="40" rx="4" fill="#e8f0fe" stroke="#fa006d" stroke-width="2"/>
<text x="328" y="549" font-size="13" font-weight="700" fill="#202124">1 分おき</text>
<text x="864" y="549" font-size="14" fill="#5f6368">▾</text>
<!-- Buttons -->
<rect x="700" y="610" width="84" height="36" rx="6" fill="#fff" stroke="#dadce0"/>
<text x="724" y="634" font-size="13" fill="#1a73e8">キャンセル</text>
<rect x="790" y="610" width="98" height="36" rx="6" fill="#1a73e8"/>
<text x="824" y="634" font-size="13" font-weight="700" fill="#fff">保存</text>
<!-- Callout -->
<rect x="930" y="356" width="250" height="200" rx="8" fill="#fa006d"/>
<text x="946" y="382" font-size="13" font-weight="700" fill="#fff">syncAll を 1 分間隔で</text>
<text x="946" y="406" font-size="11" fill="#fff">削除・黄色塗りの</text>
<text x="946" y="424" font-size="11" fill="#fff">双方向反映を担当</text>
<text x="946" y="450" font-size="11" fill="#fff">処理が 10 秒超になったら</text>
<text x="946" y="468" font-size="11" fill="#fff">3〜5 分間隔に伸ばす</text>
<line x1="946" y1="486" x2="1164" y2="486" stroke="#fff" opacity="0.4"/>
<text x="946" y="510" font-size="11" font-weight="700" fill="#fff">📍 onEdit はここに</text>
<text x="946" y="528" font-size="11" fill="#fff">登録しなくてOK</text>
<text x="946" y="544" font-size="11" fill="#fff">（シンプルトリガー）</text>

</svg>
