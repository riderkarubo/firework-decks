<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="750" fill="#f5f5f5"/>

<!-- Chrome window -->
<rect x="0" y="0" width="1200" height="68" fill="#dee1e6"/>
<!-- Traffic light -->
<circle cx="20" cy="22" r="6" fill="#ff5f56"/>
<circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
<circle cx="60" cy="22" r="6" fill="#27c93f"/>
<!-- Tab -->
<path d="M 90 44 Q 90 12 110 12 L 320 12 Q 340 12 340 44 Z" fill="#fff"/>
<circle cx="115" cy="28" r="7" fill="#1a73e8"/>
<text x="130" y="32" font-size="12" fill="#202124">コメント抽出 マスター</text>
<!-- Nav buttons -->
<circle cx="22" cy="56" r="10" fill="none" stroke="#5f6368" stroke-width="1.5"/>
<text x="18" y="60" font-size="13" fill="#5f6368">←</text>
<circle cx="52" cy="56" r="10" fill="none" stroke="#5f6368" stroke-width="1.5"/>
<text x="48" y="60" font-size="13" fill="#5f6368">→</text>
<circle cx="82" cy="56" r="10" fill="none" stroke="#5f6368" stroke-width="1.5"/>
<text x="78" y="60" font-size="11" fill="#5f6368">⟳</text>
<!-- Address bar -->
<rect x="110" y="46" width="980" height="22" rx="11" fill="#fff" stroke="#dadce0"/>
<text x="124" y="61" font-size="11" fill="#5f6368">🔒 docs.google.com/spreadsheets/d/.../edit</text>

<!-- Sheets toolbar -->
<rect x="0" y="68" width="1200" height="48" fill="#fff"/>
<text x="68" y="92" font-size="15" font-weight="700" fill="#202124">📗 コメント抽出 マスター</text>
<text x="68" y="108" font-size="11" fill="#5f6368">ファイル  編集  表示  挿入  表示形式  データ  ツール  拡張機能  ヘルプ</text>
<!-- Dimmed -->
<rect x="0" y="116" width="1200" height="634" fill="rgba(60,64,67,0.45)"/>
<!-- Dialog -->
<rect x="380" y="170" width="440" height="380" fill="#fff" rx="12"/>
<text x="408" y="208" font-size="18" font-weight="700" fill="#202124">ドキュメントのコピー</text>
<text x="408" y="234" font-size="12" fill="#5f6368">マスタースプシをコピーして新しいスプシを作成します</text>
<text x="408" y="270" font-size="11" font-weight="700" fill="#5f6368">名前</text>
<rect x="408" y="278" width="384" height="40" rx="4" fill="#fff" stroke="#1a73e8" stroke-width="2"/>
<text x="420" y="304" font-size="13" font-weight="700" fill="#202124">2026-06-28_スタバ配信_コメント抽出</text>
<text x="408" y="344" font-size="11" font-weight="700" fill="#5f6368">フォルダ</text>
<rect x="408" y="352" width="384" height="40" rx="4" fill="#f8f9fa" stroke="#dadce0"/>
<text x="420" y="378" font-size="13" fill="#202124">📁 マイドライブ &gt; ライブ配信</text>
<rect x="408" y="406" width="14" height="14" rx="2" fill="#1a73e8"/>
<text x="430" y="418" font-size="12" fill="#202124">同じユーザーと共有</text>
<rect x="408" y="430" width="14" height="14" rx="2" fill="#fff" stroke="#5f6368" stroke-width="1.5"/>
<text x="430" y="442" font-size="12" fill="#202124">コメントとアクションをコピー</text>
<!-- Buttons -->
<rect x="600" y="490" width="84" height="36" rx="6" fill="#fff" stroke="#dadce0"/>
<text x="624" y="514" font-size="13" fill="#1a73e8">キャンセル</text>
<rect x="694" y="490" width="100" height="36" rx="6" fill="#1a73e8"/>
<text x="720" y="514" font-size="13" font-weight="700" fill="#fff">コピーを作成</text>
<!-- Callout -->
<rect x="850" y="278" width="300" height="80" rx="8" fill="#fef0f5" stroke="#fa006d" stroke-width="2"/>
<text x="864" y="304" font-size="13" font-weight="700" fill="#fa006d">📌 ファイル名の規約</text>
<text x="864" y="324" font-size="11" fill="#8b1a4a">YYYY-MM-DD_配信名_コメント抽出</text>
<text x="864" y="342" font-size="11" fill="#8b1a4a">日付＋配信名で誰でも識別可能に</text>
<path d="M 840 318 L 800 318" stroke="#fa006d" stroke-width="2" marker-end="url(#arrow2)"/>
<defs><marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fa006d"/></marker></defs>

</svg>
