<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="780" fill="#faf8f5"/>

<text x="600" y="38" font-size="18" font-weight="700" fill="#1a1a2e" text-anchor="middle">popup 下半分 — 「選択中モードの設定」 NG ワード編集</text>
<!-- Popup -->
<rect x="300" y="60" width="600" height="700" fill="#fafafa" stroke="#ccc" rx="14"/>
<!-- Title -->
<g transform="translate(320,82)">
  <circle cx="6" cy="6" r="5" fill="#e50914"/>
  <text x="20" y="11" font-size="14" font-weight="700" fill="#222">Livestream コメント抽出 v4</text>
  <rect x="208" y="-2" width="48" height="18" rx="9" fill="#e50914"/>
  <text x="232" y="11" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">全コメント</text>
</g>
<!-- Sections faded -->
<rect x="320" y="110" width="560" height="80" fill="#fff" stroke="#e0e0e0" rx="8" opacity="0.4"/>
<text x="600" y="158" font-size="12" font-weight="700" fill="#666" text-anchor="middle">↑ 共通設定（GAS URL / スプシ URL）</text>
<rect x="320" y="200" width="560" height="60" fill="#fff" stroke="#e0e0e0" rx="8" opacity="0.4"/>
<text x="600" y="236" font-size="12" font-weight="700" fill="#666" text-anchor="middle">↑ モード切替（質問のみ / 全コメント）</text>

<!-- Settings card (focus) -->
<rect x="320" y="270" width="560" height="460" fill="#fff" stroke="#fa006d" stroke-width="3" rx="8"/>
<g transform="translate(338,294)">
  <rect x="0" y="-14" width="86" height="22" rx="11" fill="#e50914"/>
  <text x="43" y="2" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">全コメント</text>
  <text x="98" y="2" font-size="13" font-weight="700" fill="#666" letter-spacing="2">モードの設定</text>
</g>
<!-- NG words box -->
<text x="338" y="330" font-size="12" fill="#666" font-weight="500">NGワード（1行1語・含むと除外）</text>
<rect x="338" y="338" width="524" height="142" fill="#fff" stroke="#e0e0e0" rx="4"/>
<g font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#202124">
<text x="352" y="362">iphone</text>
<text x="352" y="384">アイフォン</text>
<text x="352" y="406">アイフォーン</text>
<text x="352" y="428">アイホン</text>
<text x="352" y="450" fill="#bdc1c6">（カーソル）</text>
</g>
<!-- Negative words box -->
<text x="338" y="504" font-size="12" fill="#666" font-weight="500">誹謗中傷ワード（1行1語）</text>
<rect x="338" y="512" width="524" height="120" fill="#fff" stroke="#e0e0e0" rx="4"/>
<g font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#202124">
<text x="352" y="536">死ね</text>
<text x="352" y="558">殺す</text>
<text x="352" y="580">バカ</text>
<text x="352" y="602">アホ</text>
</g>
<!-- Save button -->
<rect x="338" y="660" width="240" height="40" fill="#e50914" rx="6"/>
<text x="458" y="685" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">モード設定を保存</text>
<text x="338" y="720" font-size="11" fill="#666">💡 保存後は配信ページのリロードで反映</text>

<!-- Side callouts -->
<rect x="20" y="290" width="260" height="240" fill="#fa006d" rx="8"/>
<text x="40" y="320" font-size="13" font-weight="700" fill="#fff">📌 編集ルール</text>
<text x="40" y="350" font-size="12" fill="#fff">• 1 行に 1 語</text>
<text x="40" y="374" font-size="12" fill="#fff">• 大文字小文字を無視</text>
<text x="40" y="398" font-size="12" fill="#fff">• 全角半角を正規化</text>
<text x="40" y="422" font-size="12" fill="#fff">• 部分一致なのでゆるくOK</text>
<text x="40" y="446" font-size="12" fill="#fff">• モードごとに辞書独立</text>
<text x="40" y="476" font-size="11" fill="#fff" opacity="0.85">（質問のみと全コメントで</text>
<text x="40" y="494" font-size="11" fill="#fff" opacity="0.85"> 別々の設定）</text>

<rect x="920" y="290" width="260" height="200" fill="#1a1a2e" rx="8"/>
<text x="940" y="320" font-size="13" font-weight="700" fill="#fff">🔒 二重ゲート</text>
<text x="940" y="346" font-size="11" fill="#fff" opacity="0.85">① content script で</text>
<text x="940" y="364" font-size="11" fill="#fff" opacity="0.85">   先に弾く</text>
<text x="940" y="388" font-size="11" fill="#fff" opacity="0.85">② GAS 側でも再チェック</text>
<text x="940" y="416" font-size="11" fill="#fa006d" font-weight="700">保存後すぐ反映</text>
<text x="940" y="444" font-size="11" fill="#fff" opacity="0.85">（リロード不要だが</text>
<text x="940" y="462" font-size="11" fill="#fff" opacity="0.85">安全のため推奨）</text>

</svg>
