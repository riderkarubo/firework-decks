<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="750" fill="#f5f5f5"/>

<rect x="0" y="0" width="1200" height="68" fill="#dee1e6"/>
<circle cx="20" cy="22" r="6" fill="#ff5f56"/>
<circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
<circle cx="60" cy="22" r="6" fill="#27c93f"/>
<path d="M 90 44 Q 90 12 110 12 L 320 12 Q 340 12 340 44 Z" fill="#fff"/>
<circle cx="115" cy="28" r="7" fill="#1a73e8"/>
<text x="130" y="32" font-size="12" fill="#202124">2026-06-28_スタバ配信_コメント抽出</text>
<rect x="110" y="46" width="980" height="22" rx="11" fill="#fff" stroke="#dadce0"/>
<text x="124" y="61" font-size="11" fill="#5f6368">🔒 docs.google.com/spreadsheets/d/.../edit</text>

<rect x="0" y="68" width="1200" height="682" fill="#fff"/>
<!-- Sheet header -->
<rect x="0" y="68" width="1200" height="40" fill="#fff" stroke="#e8eaed"/>
<text x="68" y="93" font-size="14" font-weight="700" fill="#202124">📗 2026-06-28_スタバ配信_コメント抽出</text>
<!-- Sheet body -->
<rect x="0" y="108" width="1200" height="50" fill="#1a1a2e"/>
<g font-size="11" font-weight="700" fill="#fff">
<text x="34" y="138">☐</text><text x="80" y="138">A</text>
<text x="180" y="138">B (時刻)</text><text x="320" y="138">C</text><text x="450" y="138">D (username)</text>
<text x="620" y="138">E (comment)</text><text x="900" y="138">F (手動)</text>
</g>
<!-- Row 2: just typed in F -->
<rect x="0" y="158" width="1200" height="36" fill="#fff" stroke="#e8eaed"/>
<rect x="16" y="166" width="20" height="20" fill="#fff" stroke="#dadce0"/>
<text x="68" y="182" font-size="12" fill="#5f6368">2</text>
<text x="180" y="182" font-size="12" font-family="monospace" fill="#202124">14:32:10</text>
<rect x="316" y="166" width="32" height="20" fill="#1976d2" rx="3"/>
<text x="332" y="180" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">FW</text>
<text x="450" y="182" font-size="12" fill="#202124">テストユーザー</text>
<text x="620" y="182" font-size="12" fill="#202124">マニュアル動作確認用コメント</text>
<rect x="880" y="160" width="200" height="32" fill="#fff" stroke="#fa006d" stroke-width="3"/>
<text x="900" y="182" font-size="13" font-weight="700" fill="#202124">出演者</text>
<!-- Dimmed -->
<rect x="0" y="68" width="1200" height="682" fill="rgba(0,0,0,0.5)"/>
<!-- Permission dialog -->
<rect x="320" y="120" width="560" height="500" fill="#fff" rx="12"/>
<rect x="320" y="120" width="560" height="80" fill="#fef0f5" rx="12"/>
<text x="600" y="170" font-size="22" font-weight="700" fill="#fa006d" text-anchor="middle">⚠ 権限を確認</text>
<line x1="320" y1="200" x2="880" y2="200" stroke="#e8eaed"/>
<text x="350" y="232" font-size="14" font-weight="700" fill="#202124">「コメント抽出 v4」が次の権限を必要としています</text>
<text x="350" y="258" font-size="12" fill="#5f6368">スプレッドシートの F 列を編集したため、onEdit シンプル</text>
<text x="350" y="276" font-size="12" fill="#5f6368">トリガーが初回承認を要求しています。</text>
<!-- permission list -->
<g>
<circle cx="362" cy="316" r="4" fill="#5f6368"/>
<text x="376" y="320" font-size="12" fill="#202124">Google スプレッドシートのコンテンツの表示と編集</text>
<circle cx="362" cy="340" r="4" fill="#5f6368"/>
<text x="376" y="344" font-size="12" fill="#202124">スプレッドシートのスクリプトとして実行</text>
<circle cx="362" cy="364" r="4" fill="#5f6368"/>
<text x="376" y="368" font-size="12" fill="#202124">外部サービスへの接続</text>
</g>
<rect x="350" y="394" width="500" height="80" fill="#fff9f0" stroke="#f5c518" rx="8"/>
<text x="364" y="418" font-size="12" font-weight="700" fill="#7a5a00">🔐 you@fireworkhq.com として実行</text>
<text x="364" y="438" font-size="11" fill="#7a5a00">ここで「許可」を押すと、以降の F 列入力で自動的に</text>
<text x="364" y="454" font-size="11" fill="#7a5a00">ディレクター向けシートへの同期が動き出します</text>
<!-- Buttons -->
<rect x="540" y="540" width="120" height="40" rx="6" fill="#fff" stroke="#dadce0"/>
<text x="600" y="565" font-size="13" fill="#5f6368" text-anchor="middle">キャンセル</text>
<rect x="680" y="540" width="160" height="40" rx="6" fill="#1a73e8"/>
<text x="760" y="565" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">許可</text>
<!-- Side callout -->
<rect x="20" y="220" width="280" height="160" fill="#fa006d" rx="8"/>
<text x="36" y="246" font-size="13" font-weight="700" fill="#fff">🚨 ここがハマりがち</text>
<text x="36" y="270" font-size="11" fill="#fff">onEdit は シンプルトリガーゆえ、</text>
<text x="36" y="286" font-size="11" fill="#fff">エディタから手動実行しても</text>
<text x="36" y="302" font-size="11" fill="#fff">承認ダイアログは出ません。</text>
<text x="36" y="326" font-size="11" fill="#fff" font-weight="700">必ずスプシの F 列に</text>
<text x="36" y="342" font-size="11" fill="#fff" font-weight="700">「出演者」と人間が</text>
<text x="36" y="358" font-size="11" fill="#fff" font-weight="700">入力して承認してください</text>

</svg>
