<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect width="1200" height="640" fill="#faf8f5"/>

<text x="600" y="38" font-size="18" font-weight="700" fill="#1a1a2e" text-anchor="middle">popup 上半分のモード切替トグル — 1クリックで切替</text>

<!-- LEFT popup: questions-only active -->
<text x="300" y="84" font-size="13" font-weight="700" fill="#1976d2" text-anchor="middle">▍ 質問のみ モード (Q 青)</text>
<rect x="80" y="100" width="440" height="380" fill="#e8f0fe" rx="14" stroke="#90caf9"/>
<g transform="translate(100,124)">
  <circle cx="6" cy="6" r="5" fill="#1976d2"/>
  <text x="20" y="11" font-size="13" font-weight="700" fill="#1976d2">Livestream コメント抽出 v4</text>
  <rect x="186" y="-2" width="44" height="18" rx="9" fill="#1976d2"/>
  <text x="208" y="11" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">質問のみ</text>
</g>
<!-- Toggle -->
<rect x="100" y="170" width="400" height="60" fill="#fff" stroke="#90caf9" rx="8"/>
<text x="118" y="194" font-size="12" font-weight="700" fill="#666" letter-spacing="2">モード（クリックで切替）</text>
<rect x="118" y="202" width="364" height="44" fill="#fff" stroke="#dadce0" rx="6"/>
<rect x="118" y="202" width="182" height="44" fill="#1976d2" rx="6"/>
<text x="209" y="230" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">質問のみ</text>
<text x="391" y="230" font-size="15" font-weight="700" fill="#666" text-anchor="middle">全コメント</text>
<text x="100" y="276" font-size="11" fill="#666">FW: Show Questions Only ON のときのみ収集</text>
<text x="100" y="294" font-size="11" fill="#666">YouTube: 収集しない（content script が早期終了）</text>
<text x="100" y="312" font-size="11" fill="#666">NGワード: 既定なし</text>
<rect x="100" y="332" width="400" height="34" fill="#e8f0fe" stroke="#1976d2" rx="6"/>
<text x="118" y="354" font-size="12" fill="#1976d2">💡 Starbucks 系の質問抽出配信に最適</text>
<rect x="100" y="378" width="120" height="68" fill="#1976d2" rx="6"/>
<text x="160" y="416" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">Q</text>
<text x="160" y="436" font-size="10" fill="#fff" text-anchor="middle">#1976d2 青</text>

<!-- Transition arrow -->
<text x="600" y="290" font-size="40" fill="#fa006d" text-anchor="middle" font-weight="700">⇄</text>
<text x="600" y="320" font-size="11" font-weight="700" fill="#fa006d" text-anchor="middle">1 クリックで切替</text>

<!-- RIGHT popup: all-comments active -->
<text x="900" y="84" font-size="13" font-weight="700" fill="#e50914" text-anchor="middle">▍ 全コメント モード (A 赤)</text>
<rect x="680" y="100" width="440" height="380" fill="#fafafa" rx="14" stroke="#e0e0e0"/>
<g transform="translate(700,124)">
  <circle cx="6" cy="6" r="5" fill="#e50914"/>
  <text x="20" y="11" font-size="13" font-weight="700" fill="#222">Livestream コメント抽出 v4</text>
  <rect x="186" y="-2" width="44" height="18" rx="9" fill="#e50914"/>
  <text x="208" y="11" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">全コメント</text>
</g>
<rect x="700" y="170" width="400" height="60" fill="#fff" stroke="#e0e0e0" rx="8"/>
<text x="718" y="194" font-size="12" font-weight="700" fill="#666" letter-spacing="2">モード（クリックで切替）</text>
<rect x="718" y="202" width="364" height="44" fill="#fff" stroke="#dadce0" rx="6"/>
<rect x="900" y="202" width="182" height="44" fill="#e50914" rx="6"/>
<text x="809" y="230" font-size="15" font-weight="700" fill="#666" text-anchor="middle">質問のみ</text>
<text x="991" y="230" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">全コメント</text>
<text x="700" y="276" font-size="11" fill="#666">FW: ボタン状態を無視して全コメント収集</text>
<text x="700" y="294" font-size="11" fill="#666">YouTube: 全チャット収集（「全チャット」設定必須）</text>
<text x="700" y="312" font-size="11" fill="#666">NGワード: iphone / アイフォン / アイフォーン / アイホン</text>
<rect x="700" y="332" width="400" height="34" fill="#fdecec" stroke="#e50914" rx="6"/>
<text x="718" y="354" font-size="12" fill="#e50914">💡 Samsung 系の全コメント収集配信に最適</text>
<rect x="700" y="378" width="120" height="68" fill="#e50914" rx="6"/>
<text x="760" y="416" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">A</text>
<text x="760" y="436" font-size="10" fill="#fff" text-anchor="middle">#e50914 赤</text>

<rect x="200" y="520" width="800" height="80" rx="10" fill="#fff9f0" stroke="#f5c518" stroke-width="2"/>
<text x="600" y="556" font-size="14" font-weight="700" fill="#7a5a00" text-anchor="middle">⚠ モード切替後は必ず配信ページをリロード</text>
<text x="600" y="580" font-size="12" fill="#7a5a00" text-anchor="middle">content script は起動時にモードを読み込むため、リロードしないと旧モードのまま動き続けます</text>

</svg>
