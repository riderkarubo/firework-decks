<text x="500" y="135" font-weight="700" fill="#fa006d">▾</text>
<text x="528" y="135">ヘルプ</text>
</g>

<!-- Dimmed sheet background BELOW dropdown -->
<rect x="0" y="148" width="1200" height="602" fill="#fafbfc"/>
