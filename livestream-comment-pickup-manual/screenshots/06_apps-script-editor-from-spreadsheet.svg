<!-- Dim everything below the menu -->
<rect x="0" y="148" width="1200" height="602" fill="rgba(60,64,67,0.18)"/>

<!-- DROPDOWN MENU - drawn LAST so it's on top -->
<g>
<!-- Shadow -->
<rect x="425" y="150" width="316" height="328" fill="rgba(0,0,0,0.25)" rx="8" filter="blur(8px)"/>
<rect x="420" y="148" width="316" height="328" fill="#fff" rx="8" stroke="#e8eaed"/>

<!-- アドオン -->
<rect x="420" y="160" width="316" height="40" fill="#fff"/>
<text x="440" y="186" font-size="13" fill="#202124">🧩  アドオン</text>
<text x="716" y="186" font-size="13" fill="#5f6368">▸</text>

<!-- Apps Script - highlighted -->
<rect x="420" y="208" width="316" height="48" fill="#fef0f5"/>
<rect x="420" y="208" width="4" height="48" fill="#fa006d"/>
<text x="446" y="238" font-size="14" font-weight="700" fill="#fa006d">⚙️  Apps Script</text>

<!-- AppSheet -->
<rect x="420" y="264" width="316" height="40" fill="#fff"/>
<text x="440" y="290" font-size="13" fill="#202124">📱  AppSheet</text>
<text x="716" y="290" font-size="13" fill="#5f6368">▸</text>

<!-- マクロ -->
<rect x="420" y="312" width="316" height="40" fill="#fff"/>
<text x="440" y="338" font-size="13" fill="#202124">🔌  マクロ</text>
<text x="716" y="338" font-size="13" fill="#5f6368">▸</text>

<!-- divider -->
<line x1="436" y1="368" x2="720" y2="368" stroke="#e8eaed"/>

<!-- 拡張機能を管理 -->
<rect x="420" y="376" width="316" height="40" fill="#fff"/>
<text x="440" y="402" font-size="13" fill="#202124">⚙  拡張機能を管理</text>

<!-- Chrome ウェブストア -->
<rect x="420" y="424" width="316" height="40" fill="#fff"/>
<text x="440" y="450" font-size="13" fill="#202124">🌐  Chrome ウェブストアを開く</text>
</g>

<!-- CALLOUT — Positioned to the RIGHT of dropdown, no overlap -->
<g>
<path d="M 770 232 L 820 232" stroke="#fa006d" stroke-width="3" fill="none" marker-end="url(#a6)"/>
<defs><marker id="a6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fa006d"/></marker></defs>

<rect x="820" y="200" width="360" height="120" fill="#fa006d" rx="10"/>
<text x="844" y="234" font-size="16" font-weight="700" fill="#fff">📌 ここをクリック</text>
<text x="844" y="262" font-size="13" fill="#fff">複製先スプシ専用の Apps Script</text>
<text x="844" y="282" font-size="13" fill="#fff">エディタが新しいタブで開きます</text>
<text x="844" y="306" font-size="11" fill="#fff" opacity="0.8">コードはマスターからコピー済みです</text>
</g>

<!-- Top hint about menu sequence -->
<rect x="20" y="568" width="1160" height="60" fill="#1a1a2e" rx="8"/>
<text x="44" y="600" font-size="14" font-weight="700" fill="#fff">📋 操作の流れ:</text>
<text x="200" y="600" font-size="14" fill="#fff">① 拡張機能 ▾  をクリック  →  ② Apps Script を選択  →  ③ 新しいタブでエディタが開く</text>

</svg>
