<text x="20" y="274">5</text><text x="20" y="296">6</text><text x="20" y="318">7</text><text x="20" y="340">8</text>
<text x="80" y="164">A</text><text x="180" y="164">B</text><text x="280" y="164">C</text><text x="400" y="164">D</text><text x="600" y="164">E</text><text x="900" y="164">F</text>
</g>
<g stroke="#e8eaed" stroke-width="0.5">
<line x1="40" y1="172" x2="1200" y2="172"/><line x1="40" y1="194" x2="1200" y2="194"/><line x1="40" y1="216" x2="1200" y2="216"/>
<line x1="40" y1="238" x2="1200" y2="238"/><line x1="40" y1="260" x2="1200" y2="260"/><line x1="40" y1="282" x2="1200" y2="282"/>
<line x1="40" y1="304" x2="1200" y2="304"/><line x1="40" y1="326" x2="1200" y2="326"/><line x1="40" y1="348" x2="1200" y2="348"/>
<line x1="120" y1="172" x2="120" y2="750"/><line x1="240" y1="172" x2="240" y2="750"/><line x1="340" y1="172" x2="340" y2="750"/>
<line x1="500" y1="172" x2="500" y2="750"/><line x1="780" y1="172" x2="780" y2="750"/>
</g>
<!-- Header row of sheet (row 1) -->
<rect x="40" y="172" width="1160" height="22" fill="#1a1a2e"/>
