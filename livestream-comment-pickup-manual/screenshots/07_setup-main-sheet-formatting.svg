<g font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#202124">
<text x="324" y="148" fill="#5f6368">  1</text><text x="364" y="148" fill="#1967d2">function</text><text x="430" y="148">setupMainSheetFormatting() {</text>
<text x="324" y="170" fill="#5f6368">  2</text><text x="364" y="170" fill="#1967d2">  const</text><text x="416" y="170"> ss = SpreadsheetApp.getActiveSpreadsheet();</text>
<text x="324" y="192" fill="#5f6368">  3</text><text x="364" y="192" fill="#1967d2">  const</text><text x="416" y="192"> sheet = ss.getSheets()[0];</text>
<text x="324" y="214" fill="#5f6368">  4</text>
<text x="324" y="236" fill="#5f6368">  5</text><text x="364" y="236" fill="#5f6368">  // A列にチェックボックス</text>
<text x="324" y="258" fill="#5f6368">  6</text><text x="364" y="258">  sheet.getRange(</text><text x="498" y="258" fill="#188038">"A2:A"</text><text x="540" y="258"> + sheet.getMaxRows())</text>
<text x="324" y="280" fill="#5f6368">  7</text><text x="364" y="280">    .insertCheckboxes();</text>
<text x="324" y="302" fill="#5f6368">  8</text>
<text x="324" y="324" fill="#5f6368">  9</text><text x="364" y="324" fill="#5f6368">  // チェック行のグレーアウト条件付き書式</text>
<text x="324" y="346" fill="#5f6368"> 10</text><text x="364" y="346" fill="#1967d2">  const</text><text x="416" y="346"> rule = SpreadsheetApp.newConditionalFormatRule()</text>
<text x="324" y="368" fill="#5f6368"> 11</text><text x="364" y="368">    .whenFormulaSatisfied(</text><text x="528" y="368" fill="#188038">"=$A2=TRUE"</text><text x="600" y="368">)</text>
<text x="324" y="390" fill="#5f6368"> 12</text><text x="364" y="390">    .setBackground(</text><text x="478" y="390" fill="#188038">"#e8e8e8"</text><text x="544" y="390">).build();</text>
<text x="324" y="412" fill="#5f6368"> 13</text><text x="364" y="412">  sheet.setConditionalFormatRules([rule]);</text>
<text x="324" y="434" fill="#5f6368"> 14</text><text x="364" y="434">}</text>
</g>
